name: o-mestre-afiliado

services:
  # ─── Banco de Dados (Compartilhado) ──────────────────────────
  # Evolution API → schema evolution_api (Prisma)
  # Projeto → schema omestre (Drizzle)
  postgres:
    container_name: omestre_postgres
    image: postgres:17
    restart: always
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evolution_db}
      POSTGRES_USER: ${POSTGRES_USERNAME:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infra-net
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5443:5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-evolution} -d ${POSTGRES_DATABASE:-evolution_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache Redis ────────────────────────────────────────────────
  redis:
    container_name: omestre_redis
    image: redis:7-alpine
    restart: always
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - infra-net
    ports:
      - "${EVOLUTION_REDIS_PORT:-127.0.0.1:5445:6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Evolution API ──────────────────────────────────────────────
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EVOLUTION_API_PORT:-127.0.0.1:5444:8080}"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - infra-net
    environment:
      # Database
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: >-
        postgresql://${POSTGRES_USERNAME:-evolution}:${POSTGRES_PASSWORD:-evolution_pass}@postgres:5432/${POSTGRES_DATABASE:-evolution_db}?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: ${EVOLUTION_CLIENT_NAME:-omestre_afiliado}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # Server
      SERVER_NAME: evolution
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      # Cache (Redis)
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_TTL: 604800
      CACHE_REDIS_PREFIX_KEY: evolution_omestre

      # Auth
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Webhook Global
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-http://api:3000/webhook/message}
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_GROUPS_UPSERT: "true"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "true"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "true"

      # Logs
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET
      LOG_BAILEYS: error

      # QR Code
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#175197"

      # Outros
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: O Mestre Afiliado
      CONFIG_SESSION_PHONE_NAME: Chrome
      CORS_ORIGIN: "*"
      CORS_CREDENTIALS: "true"

      # Desabilitar integrações não utilizadas
      TYPEBOT_ENABLED: "false"
      CHATWOOT_ENABLED: "false"
      OPENAI_ENABLED: "false"
      DIFY_ENABLED: "false"
      N8N_ENABLED: "false"
      EVOAI_ENABLED: "false"
      S3_ENABLED: "false"
      RABBITMQ_ENABLED: "false"
      KAFKA_ENABLED: "false"
      SQS_ENABLED: "false"
      PUSHER_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"

  # ─── Manager (opcional — UI web para gerenciar instâncias) ─────
  evolution-manager:
    container_name: evolution_manager
    image: evoapicloud/evolution-manager:v2.3.5
    restart: always
    depends_on:
      - evolution-api
    ports:
      - "${EVOLUTION_MANAGER_PORT:-127.0.0.1:5444:80}"
    networks:
      - infra-net

volumes:
  evolution_instances:
    name: o-mestre-afiliado_evolution_instances
  redis_data:
    name: o-mestre-afiliado_redis_data
  postgres_data:
    name: o-mestre-afiliado_postgres_data

networks:
  infra-net:
    name: omestre-infra-net
    driver: bridge
