name: omestre-e2e

# ═════════════════════════════════════════════════════════════════════════
# Docker Compose para testes E2E
#
# Uso:
#   1. Build da Web:   bun run build:web
#   2. Subir stack:    docker compose -f e2e/docker-compose.e2e.yml up -d --wait
#   3. Rodar testes:   bun run test:e2e
#   4. Derrubar:       docker compose -f e2e/docker-compose.e2e.yml down -v
# ═════════════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres-e2e:
    container_name: omestre_e2e_postgres
    image: postgres:17
    restart: no
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass
    tmpfs: /var/lib/postgresql/data
    ports:
      - "127.0.0.1:15443:5432"
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ─── Redis ──────────────────────────────────────────────────────────
  redis-e2e:
    container_name: omestre_e2e_redis
    image: redis:7-alpine
    restart: no
    command: redis-server --port 6379
    tmpfs: /data
    ports:
      - "127.0.0.1:15445:6379"
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  # ─── Evolution API ──────────────────────────────────────────────────
  evolution-api-e2e:
    container_name: omestre_e2e_evolution
    image: evoapicloud/evolution-api:v2.3.7
    restart: no
    depends_on:
      postgres-e2e:
        condition: service_healthy
      redis-e2e:
        condition: service_healthy
    ports:
      - "127.0.0.1:15444:8080"
    networks:
      - e2e-net
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_pass@postgres-e2e:5432/evolution_db
      DATABASE_ENABLE_SSL: "false"
      REDIS_URI: redis://redis-e2e:6379
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: e2e-evolution-api-key

  # ─── API (O Mestre Afiliado) ────────────────────────────────────────
  api-e2e:
    container_name: omestre_e2e_api
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    restart: no
    ports:
      - "127.0.0.1:15442:5442"
    networks:
      - e2e-net
    environment:
      POSTGRES_URL: postgresql://evolution:evolution_pass@postgres-e2e:5432/evolution_db?options=--search_path%3Domestre
      API_PORT: "5442"
      JWT_SECRET: e2e-jwt-secret-for-testing-only
      ML_CLIENT_ID: ""
      ML_CLIENT_SECRET: ""
      FRONTEND_URL: http://localhost:15441
      ML_REDIRECT_URI: http://localhost:15442/api/ml/callback
    depends_on:
      postgres-e2e:
        condition: service_healthy

  # ─── Web (nginx + static) ──────────────────────────────────────────
  web-e2e:
    container_name: omestre_e2e_web
    image: nginx:alpine
    restart: no
    ports:
      - "127.0.0.1:15441:5441"
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ../apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - e2e-net
    depends_on:
      - api-e2e

networks:
  e2e-net:
    driver: bridge
