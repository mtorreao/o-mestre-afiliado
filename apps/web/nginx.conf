resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 5441;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api para o container da API (preserva /api prefixo)
    # Usar $api_upstream como variável força o nginx a re-resolver o DNS a cada
    # request (cacheado por `resolver valid=10s`). Sem isso, o nginx resolve o
    # hostname `api` apenas na inicialização e trava no IP antigo quando o
    # container da API reinicia e o Docker reatribui outro IP na rede.
    location /api/ {
        set $api_upstream ${API_UPSTREAM};
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (rota sem /api)
    location = /api/health {
        set $api_upstream ${API_UPSTREAM};
        proxy_pass http://$api_upstream/health;
    }

    # Assets estáticos
    location / {
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
